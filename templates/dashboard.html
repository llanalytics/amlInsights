<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }}</title>
    <style>
      body {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        background: linear-gradient(135deg, #eff6ff, #f6efe5);
        color: #1f2933;
      }

      main {
        max-width: 720px;
        margin: 10vh auto;
        padding: 2.5rem;
        background: rgba(255, 255, 255, 0.92);
        border-radius: 18px;
        box-shadow: 0 18px 45px rgba(31, 41, 51, 0.14);
      }

      h1 {
        margin-top: 0;
        font-size: 2.4rem;
      }

      a {
        color: #1f5f8b;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Dashboard</h1>
      <p>You are signed in as <strong>{{ user }}</strong>.</p>
      <p>This is a protected page that only loads when the session cookie is present.</p>
      <form method="post" action="/logout">
        <input name="csrf_token" type="hidden" value="{{ csrf_token }}">
        <button type="submit">Log out</button>
      </form>
    </main>
  </body>
</html>
