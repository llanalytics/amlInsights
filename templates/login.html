<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }}</title>
    <style>
      body {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        background: linear-gradient(135deg, #f5efe6, #dce8f2);
        color: #1f2933;
      }

      main {
        max-width: 520px;
        margin: 10vh auto;
        padding: 2.5rem;
        background: rgba(255, 255, 255, 0.92);
        border-radius: 18px;
        box-shadow: 0 18px 45px rgba(31, 41, 51, 0.14);
      }

      h1 {
        margin-top: 0;
        font-size: 2.2rem;
      }

      form {
        display: grid;
        gap: 1rem;
      }

      label {
        font-weight: 700;
      }

      input {
        width: 100%;
        box-sizing: border-box;
        margin-top: 0.35rem;
        padding: 0.75rem 0.9rem;
        border: 1px solid #cfd8df;
        border-radius: 10px;
        font: inherit;
      }

      button,
      a.button-link {
        display: inline-block;
        padding: 0.8rem 1.2rem;
        border: 0;
        border-radius: 999px;
        background: #1f5f8b;
        color: #fff;
        font: inherit;
        text-decoration: none;
        cursor: pointer;
      }

      .error {
        padding: 0.85rem 1rem;
        border-radius: 12px;
        background: #fbe4e6;
        color: #8a1f2d;
      }

      .hint {
        margin-top: 1.5rem;
        color: #52606d;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Sign in</h1>
      {% if error %}
      <p class="error">{{ error }}</p>
      {% endif %}
      <form method="post" action="/login">
        <label>
          Username
          <input name="username" type="text" autocomplete="username" required>
        </label>
        <label>
          Password
          <input name="password" type="password" autocomplete="current-password" required>
        </label>
        <button type="submit">Log in</button>
      </form>
      <p class="hint">Starter credentials: <strong>admin</strong> / <strong>changeme123</strong></p>
      <p><a class="button-link" href="/">Back home</a></p>
    </main>
  </body>
</html>
