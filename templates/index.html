<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }}</title>
    <style>
      body {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        background: linear-gradient(135deg, #f5efe6, #dce8f2);
        color: #1f2933;
      }

      main {
        max-width: 720px;
        margin: 10vh auto;
        padding: 2.5rem;
        background: rgba(255, 255, 255, 0.9);
        border-radius: 18px;
        box-shadow: 0 18px 45px rgba(31, 41, 51, 0.14);
      }

      h1 {
        margin-top: 0;
        font-size: 2.4rem;
      }

      p {
        font-size: 1.1rem;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>{{ heading }}</h1>
      <p>{{ message }}</p>
    </main>
  </body>
</html>
