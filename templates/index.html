<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>amlInsights</title>
    <style>
      body {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        background: linear-gradient(135deg, #f5efe6, #dce8f2);
        color: #1f2933;
      }

      main {
        max-width: 720px;
        margin: 10vh auto;
        padding: 2.5rem;
        background: rgba(255, 255, 255, 0.9);
        border-radius: 18px;
        box-shadow: 0 18px 45px rgba(31, 41, 51, 0.14);
      }

      h1 {
        margin-top: 0;
        font-size: 2.4rem;
      }

      p {
        font-size: 1.1rem;
        line-height: 1.6;
      }

      a.button-link {
        display: inline-block;
        margin-top: 1rem;
        padding: 0.8rem 1.2rem;
        border-radius: 999px;
        background: #1f5f8b;
        color: #fff;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>{{ heading }}</h1>
      <p>{{ message }}</p>
      {% if is_authenticated %}
      <p>Signed in as <strong>{{ user }}</strong>.</p>
      <p><a class="button-link" href="/dashboard">Open dashboard</a></p>
      <form method="post" action="/logout">
        <input name="csrf_token" type="hidden" value="{{ csrf_token }}">
        <button class="button-link" type="submit">Log out</button>
      </form>
      {% else %}
      <p><a class="button-link" href="/login">Log in</a></p>
      {% endif %}
    </main>
  </body>
</html>
